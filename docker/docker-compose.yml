services:
  db:
    image: postgres:16
    container_name: swush-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: swush
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swush"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - swush-db:/var/lib/postgresql/data:rw
    networks:
      - swush

  redis:
    image: redis:7-alpine
    container_name: swush-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - swush-redis:/data:rw
    networks:
      - swush

  app:
    image: iconical/swush:latest
    container_name: swush-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      JOB_RUNNER_ROLE: api
      RUN_DB_MIGRATIONS: "true"
      REDIS_URL: "redis://redis:6379/0"

    ports:
      - "3419:3000"
    volumes:
      # Can be removed if you don't want to persist uploads outside the container or using S3 for uploads
      - swush-uploads:/data/uploads:rw
    networks:
      - swush

  worker:
    image: iconical/swush:latest
    container_name: swush-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      JOB_RUNNER_ROLE: worker
      RUN_DB_MIGRATIONS: "false"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - swush-uploads:/data/uploads:rw
    networks:
      - swush

volumes:
  swush-db:
  swush-uploads:
  swush-redis:

networks:
  swush:
